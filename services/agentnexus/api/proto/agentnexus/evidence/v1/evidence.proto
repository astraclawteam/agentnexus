syntax = "proto3";

package agentnexus.evidence.v1;

option go_package = "github.com/astraclawteam/agentnexus/services/agentnexus/api/proto/agentnexus/evidence/v1;evidencev1";

// Vendor-neutral evidence plane of the Agent runtime contract v1
// (ELC-NEXUS-1 candidate). Evidence is declared as business-semantic data
// needs and addressed through opaque handles; connector topology (instances,
// endpoints, tables, API paths) never appears in these messages.

// Constraints bounds a request without ever addressing connector topology.
message Constraints {
  int64 max_results = 1;
  repeated string allowed_fields = 2;
  repeated string prohibited_uses = 3;
}

// DataNeed declares one business-semantic data need.
message DataNeed {
  string need_id = 1;
  string data_class = 2; // business vocabulary term, never a connector location
  string purpose = 3;
  repeated string fields = 4;
  Constraints constraints = 5;
}

// EvidenceRequest asks the runtime to locate evidence for declared data
// needs. Trusted identity is bound by the verified principal context, never
// by this message.
message EvidenceRequest {
  string request_id = 1;
  string trace_id = 2;
  string business_context_ref = 3; // opaque wc_* handle; empty opens a work case
  repeated DataNeed data_needs = 4;
  string purpose = 5;
  Constraints constraints = 6;
  string expires_at = 7; // RFC 3339
}

// EvidenceHandle is the opaque typed handle through which located evidence
// is addressed.
message EvidenceHandle {
  string evidence_ref = 1; // opaque evd_* handle
  string data_class = 2;
  string summary = 3;
  string expires_at = 4; // RFC 3339
}

// VerificationBinding is the verification block of a verification-purpose
// read (contract v1.4.0, GA Task 0D amendment): it binds the original
// executed Action (action_ref + parameter_hash) and the declared
// PostconditionSpec/VerificationNeed pair the read verifies, carrying the
// need's declared business-semantic data-class expectation. The block is
// all-or-nothing and coupled to the frozen verification purpose
// "postcondition_verification". Source authority, sealed source version,
// observed-at and freshness are derived server-side and never travel here.
message VerificationBinding {
  string action_ref = 1;           // opaque act_* handle of the executed Action
  string parameter_hash = 2;       // sha256:<64 hex> binding of the exact parameters
  string postcondition_id = 3;     // declared PostconditionSpec under verification
  string verification_need_id = 4; // declared VerificationNeed being satisfied
  string data_class = 5;           // the need's declared business-semantic data class
}

// EvidenceReadRequest reads one located evidence handle under policy.
message EvidenceReadRequest {
  string request_id = 1;
  string trace_id = 2;
  string business_context_ref = 3;
  string evidence_ref = 4;
  repeated string fields = 5;
  string purpose = 6;
  Constraints constraints = 7;
  string expires_at = 8; // RFC 3339
  // Optional verification block (contract v1.4.0); present exactly when
  // purpose is "postcondition_verification". An allowed verification-purpose
  // read emits a signed agentnexus.actions.v1.ObservationReceipt on the
  // response envelope (an OpenAPI/SDK surface, as since contract v1.2.0).
  VerificationBinding verification_binding = 9;
}
