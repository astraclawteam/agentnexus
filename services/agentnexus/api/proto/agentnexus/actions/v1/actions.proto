syntax = "proto3";

package agentnexus.actions.v1;

import "agentnexus/trust/v1/trust.proto";

option go_package = "github.com/astraclawteam/agentnexus/services/agentnexus/api/proto/agentnexus/actions/v1;actionsv1";

// Vendor-neutral action plane of the Agent runtime contract v1
// (ELC-NEXUS-1 candidate). Actions are typed: a namespaced business-semantic
// capability plus capability-typed parameters bound by an exact parameter
// hash. The legacy untyped action+input shape is retired. Connector topology
// never appears in these messages.

// ActionStatus is the frozen Action lifecycle (implemented by the runtime
// state machine).
enum ActionStatus {
  ACTION_STATUS_UNSPECIFIED = 0;
  ACTION_STATUS_REQUESTED = 1;
  ACTION_STATUS_AWAITING_APPROVAL = 2;
  ACTION_STATUS_GRANTED = 3;
  ACTION_STATUS_DISPATCHED = 4;
  ACTION_STATUS_EXECUTING = 5;
  ACTION_STATUS_SUCCEEDED = 6;
  ACTION_STATUS_FAILED = 7;
  ACTION_STATUS_RESULT_UNKNOWN = 8;
  ACTION_STATUS_RECONCILING = 9;
  ACTION_STATUS_COMPENSATING = 10;
  ACTION_STATUS_HUMAN_TAKEOVER = 11;
}

// BusinessCapabilityRequest asks whether — and under which constraints — a
// business-semantic capability may be exercised inside a business context.
message BusinessCapabilityRequest {
  string request_id = 1;
  string trace_id = 2;
  string business_context_ref = 3;
  string capability = 4;
  string parameter_hash = 5; // optional before parameters exist
  string purpose = 6;
  string expires_at = 7; // RFC 3339
}

// Precondition states an assumption that must still hold at execution time.
message Precondition {
  string kind = 1;
  string reference = 2;
  string expected = 3;
}

// PostconditionSpec declares one business-state condition expected to hold
// AFTER the action executed (contract v1.3.0). It is declared by the calling
// Agent and later checked by a verification observation; the runtime records
// and transmits it but never evaluates whether the business goal behind it
// was achieved.
message PostconditionSpec {
  string postcondition_id = 1; // request-scoped id bound by VerificationNeed/ObservationReceipt
  string kind = 2;
  string reference = 3;
  string expected = 4;
}

// VerificationNeed declares one post-action verification data need
// (contract v1.3.0): it binds exactly one declared postcondition to a
// business-semantic data class whose authorized source will be observed
// after execution. The data class is business vocabulary, never a connector
// table, API path or instance selector. A satisfied verification need
// produces a signed ObservationReceipt.
message VerificationNeed {
  string need_id = 1;          // request-scoped id bound by ObservationReceipt
  string postcondition_id = 2; // declared postcondition this need verifies
  string data_class = 3;
}

// ActionRequest is the only way an Agent asks for a side effect. The Agent
// client and release are bound through the verified principal context, never
// through this message.
message ActionRequest {
  string request_id = 1;
  string trace_id = 2;
  string business_context_ref = 3;
  string capability = 4;
  bytes parameters_json = 5; // capability-typed parameters, exact bytes
  string parameter_hash = 6; // sha256:<64 hex> over parameters_json
  string purpose = 7;
  agentnexus.trust.v1.RiskDecision risk_decision = 8;
  agentnexus.trust.v1.ApprovalPlanRef approval_plan_ref = 9;
  string idempotency_key = 10;
  repeated Precondition preconditions = 11;
  string expires_at = 12; // RFC 3339
  string expected_receipt_schema = 13;
  string compensation_ref = 14; // optional compensating capability reference
  // Contract v1.3.0 additions (append-only field numbers): declared
  // postconditions and the exact verification needs bound to them.
  repeated PostconditionSpec postconditions = 15;
  repeated VerificationNeed verification_needs = 16;
}

// Action is the runtime's view of one requested side effect.
message Action {
  string action_ref = 1; // opaque act_* handle
  ActionStatus status = 2;
  string business_context_ref = 3;
  string capability = 4;
  string parameter_hash = 5;
  string grant_ref = 6;
  string approval_evidence_ref = 7;
  string receipt_ref = 8;
  string updated_at = 9; // RFC 3339
}

// ActionReceipt is the runtime's account of what actually happened to one
// Action. Receipt signing lands with the audit signing task; the slot is
// frozen here.
message ActionReceipt {
  string receipt_ref = 1; // opaque rcp_* handle
  string action_ref = 2;
  ActionStatus status = 3;
  string capability = 4;
  string parameter_hash = 5;
  string receipt_schema = 6;
  bytes result_json = 7;  // receipt payload typed by receipt_schema
  string result_hash = 8; // sha256:<64 hex> over result_json
  string issued_at = 9;   // RFC 3339
  agentnexus.trust.v1.Signature signature = 10;
}

// ObservationReceipt is the signed proof of what an authorized source
// reported at a bounded time about one declared postcondition of one
// executed Action (contract v1.3.0). Authority boundary: ActionReceipt
// attests technical execution only; ObservationReceipt proves a bounded
// authoritative observation; neither message carries a business Outcome
// assertion — the runtime never decides whether a business goal or Outcome
// was achieved and never owns or queries the calling Agent platform's
// result graph. The observation content stays behind the opaque evidence
// handle (never embedded) and the signature is required.
message ObservationReceipt {
  string observation_ref = 1; // opaque obs_* handle
  string action_ref = 2;      // original executed Action
  string parameter_hash = 3;  // sha256:<64 hex> binding of the original parameters
  string postcondition_id = 4;     // declared PostconditionSpec checked
  string verification_need_id = 5; // declared VerificationNeed satisfied
  string source = 6;          // business-semantic authorized source identity
  int64 source_version = 7;   // sealed source content version, starts at 1
  string authority = 8;       // authority under which the source reported
  string observed_at = 9;     // RFC 3339
  string fresh_until = 10;    // RFC 3339; must be after observed_at
  string observation_hash = 11; // sha256:<64 hex> over the normalized observation
  string evidence_ref = 12;   // opaque evd_* handle carrying the content
  string audit_ref_id = 13;   // audit chain reference
  agentnexus.trust.v1.Signature signature = 14; // required
}
