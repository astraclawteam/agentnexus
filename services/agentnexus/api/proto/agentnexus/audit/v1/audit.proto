syntax = "proto3";

package agentnexus.audit.v1;

import "agentnexus/actions/v1/actions.proto";

option go_package = "github.com/astraclawteam/agentnexus/services/agentnexus/api/proto/agentnexus/audit/v1;auditv1";

// Vendor-neutral audit plane of the Agent runtime contract v1
// (ELC-NEXUS-1 candidate). Every event binds the verified principal, the
// Agent client release, the sealed organization snapshot, the exact
// operation, the signed risk decision, the approval evidence, the grant, the
// action transition and the receipt into a tenant-sequenced hash chain.
// Chain signing lands with the audit signing task; the fields are frozen
// here. Connector topology never appears in these messages.
//
// Wire note: the v1.0.0 field numbering in this file is the FIRST frozen
// assignment and is wire-incompatible with any pre-GA draft of audit.proto.
// Never decode bytes produced before this freeze with this schema.

// AuditAction publishes the bounded actions accepted by the HTTP audit append
// contract. AuditEvent.action carries the bounded AuditAction value by its
// lowercase name for service audit events.
enum AuditAction {
  AUDIT_ACTION_UNSPECIFIED = 0;
  WORKFLOW_DRAFT_CREATED = 1;
  WORKFLOW_VERSION_PUBLISHED = 2;
  DREAM_POLICY_CREATED = 3;
  DREAM_POLICY_CREATE_REQUESTED = 4;
  DREAM_JOB_RUN = 5;
  RETRIEVAL_PLAN_CREATED = 6;
  EVIDENCE_LOCATED = 7;
  EVIDENCE_READ = 8;
  ANSWER_TRACE_CREATED = 9;
  SENSITIVE_ARTIFACT_PARSED = 10;
  VISIBILITY_RULE_CHANGED = 11;
}

message AuditEvent {
  string id = 1;
  string tenant_ref = 2;   // opaque verified tenant reference
  uint64 tenant_seq = 3;   // per-tenant monotonic sequence, starts at 1
  string business_context_ref = 4;
  string principal_ref = 5; // opaque verified actor reference
  string agent_client_ref = 6;
  string agent_release_ref = 7;
  string org_snapshot_ref = 8;
  string capability = 9;
  string parameter_hash = 10; // sha256:<64 hex>
  string risk_decision_ref = 11;
  string approval_evidence_ref = 12;
  string grant_ref = 13;
  string action_ref = 14;
  agentnexus.actions.v1.ActionStatus status_from = 15;
  agentnexus.actions.v1.ActionStatus status_to = 16;
  string receipt_ref = 17;
  string resource_type = 18; // business resource type for service audit events
  string resource_id = 19;
  string action = 20; // bounded AuditAction value for service audit events
  string occurred_at = 21; // RFC 3339
  EvidencePointer evidence_pointer = 22;
  string prev_hash = 23;  // sha256:<64 hex>; empty only for the genesis event
  string event_hash = 24; // sha256:<64 hex>; populated by audit signing
}

message AuditChain {
  string id = 1;
  string tenant_ref = 2;
  string business_context_ref = 3;
  repeated AuditEvent events = 4;
  string head_hash = 5;
}

message EvidencePointer {
  string uri = 1;
  string content_type = 2;
  string sha256 = 3;
}

// GA Task 0G signed audit verification surface (ADDITIVE — new messages only;
// the frozen AuditEvent and AuditChain above are unchanged). These messages
// describe the offline WORM/SIEM verification package: the signed per-tenant
// chain, the signing public keys with their revocation state, the batch Merkle
// root with its signer-asserted timestamp, and per-event inclusion witnesses. The
// authority boundary is unchanged: these records prove WHAT happened and that
// the chain is untampered; none asserts a business Outcome.

// AuditSignature is a detached ed25519 signature over a canonical pre-image.
message AuditSignature {
  string algorithm = 1; // "ed25519"
  string key_id = 2;
  string value = 3;     // base64-encoded signature bytes
}

// SignedAuditEvent wraps one frozen AuditEvent with its GA Task 0G signature and
// the app-signed instant bound into the canonical pre-image. The frozen event
// carries tenant_seq, prev_hash and event_hash; the signature binds them.
message SignedAuditEvent {
  AuditEvent event = 1;
  AuditSignature signature = 2;
  string signed_at = 3; // RFC 3339 (microsecond canonical precision)
}

// AuditSigningKey is a registered signing public key and its append-only
// lifecycle, so an offline verifier can resolve signatures and reject a
// signature by a revoked key.
message AuditSigningKey {
  string key_id = 1;
  string algorithm = 2;  // "ed25519"
  bytes public_key = 3;  // 32-byte ed25519 public key
  string status = 4;     // "active" | "revoked"
  string created_at = 5; // RFC 3339
  string revoked_at = 6; // RFC 3339; empty unless revoked
}

// MerkleSibling is one step of an inclusion proof: the sibling digest and
// whether it sits to the right of the running hash.
message MerkleSibling {
  string hash = 1;
  bool right = 2;
}

// MerkleWitness is an inclusion proof for one event, leaf to root.
message MerkleWitness {
  uint64 leaf_index = 1;
  repeated MerkleSibling siblings = 2;
}

// AuditBatchRoot is the signed WORM/SIEM manifest of one exported chain segment:
// the batch Merkle root over the event hashes, the covered sequence window, the
// event count and the signer-asserted timestamp, all bound by one signature.
message AuditBatchRoot {
  string tenant_ref = 1;
  uint64 first_seq = 2;
  uint64 last_seq = 3;
  uint64 event_count = 4;
  string root_hash = 5;  // sha256:<64 hex>
  string signed_at = 6;  // RFC 3339 signer-asserted timestamp
  AuditSignature signature = 7;
}

// AuditVerificationPackage is the portable offline verification bundle: the
// ordered signed events, the signing keys with revocation state, the signed
// batch Merkle root and per-event inclusion witnesses. It re-verifies with
// stdlib crypto only, independent of any live service.
message AuditVerificationPackage {
  string version = 1;
  string tenant_ref = 2;
  repeated SignedAuditEvent events = 3;
  repeated AuditSigningKey keys = 4;
  AuditBatchRoot batch = 5;
  repeated MerkleWitness witnesses = 6;
}
