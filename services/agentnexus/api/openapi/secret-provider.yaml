openapi: 3.0.3
info:
  title: AgentNexus Secret Provider Protocol
  version: 1.0.0
  x-non-normative: >-
    SEMANTIC SKETCH — NOT a generatable HTTP client. The real transport is a
    single-connection JSON request/response ENVELOPE over a local authenticated
    socket, not literal REST-over-HTTP. On the wire a request is
    {"op":"acquire|redeem|ping", "acquire"|"redeem": {...}} and the caller
    authentication token travels INSIDE the request body (the acquire/redeem
    object's caller_token field), NOT in an Authorization header; handle_id
    travels in the redeem body, not a path segment; ttl is an int64 nanosecond
    count (Go time.Duration), not an ISO/"90s" string. The paths, methods,
    bearer security scheme and status codes below are an editorial mapping of
    those semantics for readers. The NORMATIVE contract is the Go SDK
    (github.com/astraclawteam/agentnexus/sdk/go/secretprovider) and the
    service client (services/agentnexus/internal/secrets). Do not code-generate
    a client from this file.
  description: >-
    Authenticated LOCAL protocol (GA Task 3) that a service uses to exchange a
    master credential reference for an operation-scoped, short-lived Secret
    Handle, and to redeem that handle for derived operation material.


    This is an INTERNAL contract surface. It is NOT part of the frozen public
    Agent runtime contract (ELC-NEXUS-1) and is deliberately absent from
    api/contract.lock. The transport is a local authenticated channel only — a
    Unix-domain socket, a Windows named pipe, or a loopback endpoint with a
    per-instance caller token — never a network-exposed listener. The Go SDK
    (github.com/astraclawteam/agentnexus/sdk/go/secretprovider) abstracts the
    transport behind the Provider interface; this document specifies the wire
    semantics that in-process and socket implementations share. See
    x-non-normative above: this file is a semantic sketch, not a generatable
    HTTP client — the caller token and handle id travel in the request body and
    ttl is int64 nanoseconds.


    Invariants: a connector NEVER receives a master credential. A Handle carries
    no secret material at all; usable material is derived (a one-way function of
    the master + version + a per-handle nonce), obtained only by redeeming the
    handle, and is valid solely for the handle's bound connector identity,
    operation scope, master version and single-use/TTL lifetime. Master and
    plaintext credentials never appear in a manifest, the environment, a log
    line, a connector RPC payload or an audit record. When the provider is
    unavailable, callers fail closed: there is no plaintext or cached-master
    fallback.
servers:
  - url: unix:/run/agentnexus/secret-provider.sock
    description: >-
      Local Unix-domain socket (POSIX). On Windows the equivalent local
      transport is a named pipe or a loopback+token endpoint. The path/endpoint
      is deployment-scoped and never network-reachable.
security:
  - localCallerToken: []
paths:
  /healthz:
    get:
      operationId: pingProvider
      summary: Provider reachability probe (fail-closed readiness).
      description: >-
        Reports whether the Secret Provider is reachable. Production readiness
        checks call this and fail closed on any non-200 response: an unreachable
        provider is a hard error, not a downgrade.
      responses:
        "200":
          description: Provider is reachable.
        "503":
          description: Provider unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /handles:
    post:
      operationId: acquireHandle
      summary: Acquire an operation-scoped Secret Handle.
      description: >-
        Authenticates the caller and issues a short-lived Secret Handle bound to
        one connector identity, one operation scope, one master version and a
        single-use or TTL lifetime. Never returns a master credential. A
        requested TTL above the provider maximum is clamped, never honored.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcquireRequest"
      responses:
        "201":
          description: Handle issued.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Handle"
        "400":
          description: Malformed request (invalid scope, credential reference or TTL).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Caller not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Credential reference unknown to the provider.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Provider unavailable (fail closed; no fallback).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /handles/{handle_id}/redeem:
    post:
      operationId: redeemHandle
      summary: Redeem a Secret Handle for its derived operation material.
      description: >-
        Authenticates the caller and returns the handle's derived,
        operation-scoped material. The provider enforces exact scope match
        (connector identity + operation), live master version, TTL and
        single-use consumption. The returned material is never the master
        credential and travels only over the authenticated local channel.
      parameters:
        - name: handle_id
          in: path
          required: true
          description: Opaque handle identifier returned by acquire.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RedeemRequest"
      responses:
        "200":
          description: Handle redeemed; derived material returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RedeemResponse"
        "401":
          description: Caller not authenticated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: >-
            Scope mismatch — the handle was issued for a different connector
            identity or operation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Handle unknown to the provider.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Single-use handle already consumed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: >-
            Handle no longer valid — expired, or bound to a master version that
            was revoked or rotated away.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Provider unavailable (fail closed; no fallback).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
components:
  securitySchemes:
    localCallerToken:
      type: http
      scheme: bearer
      description: >-
        Per-instance local caller token presented on every call and compared in
        constant time by the provider. It authenticates the local caller over
        the socket/pipe transport and is never embedded in an issued handle.
        NOTE (see x-non-normative): on the real wire the token is carried in the
        request body (caller_token), not an Authorization header; the bearer
        scheme here is an editorial representation only.
  schemas:
    Scope:
      type: object
      description: The connector identity and operation a handle is bound to.
      additionalProperties: false
      required: [connector_ref, resource, operation, action]
      properties:
        connector_ref:
          type: string
          description: Connector identity the handle is issued to.
        resource:
          type: string
          description: Connector resource the operation addresses.
        operation:
          type: string
          description: Connector operation name.
        action:
          type: string
          enum: [read, write]
          description: Operation action.
    AcquireRequest:
      type: object
      additionalProperties: false
      required: [scope, credential_ref, ttl]
      properties:
        scope:
          $ref: "#/components/schemas/Scope"
        credential_ref:
          type: string
          description: >-
            Opaque reference to the master credential to derive from. It is a
            reference only; the master value never appears in this protocol.
        ttl:
          type: integer
          format: int64
          description: >-
            Requested handle lifetime in NANOSECONDS (a Go time.Duration marshals
            as an int64 nanosecond count, e.g. 90000000000 for 90s). Must be
            positive; clamped to the provider maximum (MaxHandleTTL, 15m).
        single_use:
          type: boolean
          default: false
          description: If true, the handle may be redeemed at most once.
    Handle:
      type: object
      description: >-
        Opaque, non-secret handle metadata. This is the only handle
        representation that may cross a connector RPC boundary or enter an audit
        record. It carries no secret material.
      additionalProperties: false
      required: [handle_id, scope, version, issued_at, expires_at, single_use]
      properties:
        handle_id:
          type: string
          description: Opaque handle identifier used to redeem it.
        scope:
          $ref: "#/components/schemas/Scope"
        version:
          type: string
          description: Opaque master version the handle derives from.
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        single_use:
          type: boolean
    RedeemRequest:
      type: object
      additionalProperties: false
      required: [scope]
      properties:
        scope:
          $ref: "#/components/schemas/Scope"
    RedeemResponse:
      type: object
      additionalProperties: false
      required: [material]
      properties:
        material:
          type: string
          description: >-
            Derived, operation-scoped material for the bound operation. Never the
            master credential. Use at the point of the operation; never store,
            log or persist it.
    Error:
      type: object
      additionalProperties: false
      required: [error]
      properties:
        error:
          type: string
          description: >-
            Stable failure code: unauthenticated, invalid_request,
            unknown_credential, invalid_handle, scope_mismatch, expired,
            consumed, revoked_version or unavailable. Error bodies never echo
            credential values.
