openapi: 3.0.3
info:
  title: AgentNexus Gateway Agent API
  version: 0.1.0
  description: Implemented Gateway Agent entrypoints. Agent run, message, and confirmation APIs are tracked for M5 and should be added only with matching handlers.
paths:
  /v1/agent/deployments/first-run:plan:
    post:
      operationId: planFirstDeployment
      summary: Build a first-deployment dry-run plan.
      description: Returns a plan only. The endpoint does not execute Docker, Helm, shell commands, or production deployment actions.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FirstDeploymentPlanRequest'
      responses:
        '200':
          description: Dry-run deployment plan.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeploymentPlan'
components:
  schemas:
    FirstDeploymentPlanRequest:
      type: object
      properties:
        profile:
          type: string
          default: private-dev
        compose_file:
          type: string
          default: deploy/compose/compose.private-dev.yaml
    DeploymentPlan:
      type: object
      required:
        - profile
        - mode
        - steps
        - requires_confirmation
      properties:
        profile:
          type: string
        mode:
          type: string
          enum:
            - dry_run
        steps:
          type: array
          items:
            $ref: '#/components/schemas/DeploymentPlanStep'
        requires_confirmation:
          type: boolean
    DeploymentPlanStep:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        command:
          type: string
        description:
          type: string
