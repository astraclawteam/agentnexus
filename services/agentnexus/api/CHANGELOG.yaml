# Machine-readable protocol changelog of the AgentNexus public contract.
# Digest pins of the artifacts named here live in api/contract.lock
# (regenerate: `go run ./cmd/contract-lock -update`;
#  verify:     `go run ./cmd/contract-lock -verify`, wired as
#  `make contracts-verify` together with the contract parity tests).
protocol: agentnexus-public-contract
entries:
  - version: "1.8.0"
    date: "2026-07-21"
    breaking: false
    title: "Publish the organization change feed (GA Task 0D org-events)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: the
      organization graph gains its missing PUBLIC subscription surface. A new
      GET /v1/org-events Server-Sent Events stream, authorized by
      trustedServiceSecret only, emits the new OrgEvent message. AgentNexus has
      owned the OrgEvent/OrgVersion domain since 1.0.0 but never published a way
      to observe it, so a consumer that synchronizes from the organization graph
      had no contract-legal path. Adding the extension point to the public
      contract - rather than working around its absence in the consumer - is the
      boundary rule both repositories declare. No existing schema, field,
      operation or enum changes.
      Two boundaries are enforced by the new surface rather than documented
      around it. Tenant scope stays credential-derived (v1.1.0 / Task 0B): the
      operation declares NO enterprise identifier parameter, so the feed a
      caller receives is exactly the tenant its verified credential proves.
      The feed is a change notification, never an evidence channel: OrgEvent
      carries only event_id, event_type, the sealed org_version the change
      produced and occurred_at, and the schema forbids payload and source_hash.
      Organization membership, unit and source material remain reachable only
      through the evidence surface under an Access Ticket, so subscribing to
      the feed grants no additional read authority.
      The stream is resumable by sealed organization version: since_version is
      OPTIONAL so a first-time consumer starts from the first retained event,
      and a reconnecting consumer replays strictly after the last version it
      durably applied. A cursor ahead of the tenant's current sealed version is
      a 409 rather than a silent empty stream, so consumer state corruption
      fails loudly.
  - version: "1.7.0"
    date: "2026-07-15"
    breaking: false
    title: "Sign and independently verify the audit evidence chain (GA Task 0G)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: the
      vendor-neutral audit plane gains its signing and independent-verification
      surface. New rows on the high-risk action-transition sub-chain carry a
      per-tenant monotonic sequence (tenant_seq, starting at 1), a detached
      ed25519 signature (algorithm/key_id/value) and signed_at, canonicalized at
      microsecond precision. A registered signing-key registry (active|revoked)
      supports revoked-key detection, and a signed batch Merkle root with a
      signer-asserted timestamp backs a portable WORM/SIEM verification package that
      re-verifies offline with stdlib crypto only. The frozen AuditEvent and
      AuditChain messages are UNCHANGED (fields 1-24 byte-stable); only NEW
      messages are added. Audit integrity failure blocks new high-risk Actions
      while preserving diagnostics and export. The authority boundary is
      unchanged: audit records prove WHAT happened and that the chain is
      untampered - never a business Outcome (the verifier rejects any event
      asserting outcome/goal_achieved/result-graph, mirroring the Task 0A ban).
      Carry-over: the evidence-request single-purpose rule and the per-request
      data-need cap are untouched by this entry. This entry also consumes the
      signer-error-logging seam deferred from the 0D amendment - the audit
      signer path preserves and logs the underlying signer cause for diagnostics
      while still failing closed, never leaking key material.
      AUTHENTICITY: offline verification is against a caller-supplied PINNED
      trusted signing key; the bundle's embedded keys supply revocation metadata
      only and can never be the trust root, so a fabricated self-signed bundle is
      rejected (bundle self-consistency is not authenticity). The runtime signer
      requires a STABLE configured key (no silent ephemeral key). Receipt
      completion FAILS CLOSED without a wired verifier. The batch-root timestamp
      is honestly labelled signer-asserted (an external RFC-3161/TSA anchor is
      downstream), and the business-Outcome control is the constrained internal
      audit vocabulary with the substring lint as defense-in-depth. Binding
      NARROWING (documented, so the pinned artifacts stay literally true): the
      action-transition event binds status_from, capability, parameter_hash,
      grant_ref, approval_evidence_ref, receipt_ref, risk_authority and the
      verified agent_client_ref/agent_release_ref/org_snapshot_ref as first-class
      recoverable signed columns; the specific risk DECISION id and the
      observation receipt are not persisted at this append site and are recorded
      as narrowings (the risk authority is bound; the observation receipt is the
      separate 0D signed artifact). gateway-runtime.yaml is intentionally NOT
      modified: 0G adds no Agent-facing HTTP operation (verification and export
      are offline/operator surfaces). Audit-signing and connector-receipt keys
      currently share one signing-key registry; a per-key purpose discriminator
      is a documented downstream refinement.
    changes:
      - "New audit/v1 messages (additive, new field numbers; AuditEvent and AuditChain unchanged): AuditSignature, SignedAuditEvent, AuditSigningKey, MerkleSibling, MerkleWitness, AuditBatchRoot, AuditVerificationPackage. They describe the signed per-tenant chain, the signing public keys with their revocation state, the batch Merkle root with its signer-asserted timestamp, and per-event inclusion witnesses. No trusted-identity, connector-topology or business-outcome name is introduced."
      - "Signing plane behind the frozen shapes: the high-risk action-transition audit sub-chain allocates a per-tenant monotonic tenant_seq under the per-enterprise advisory lock, links signed->signed by prev_hash, and carries an ed25519 signature over the canonical event pre-image (signature slot and event_hash zeroed, timestamps UTC at microsecond precision). The existing per-enterprise SHA-256 hash chain is retained as the hash-only layer; a missing signer fails the high-risk append CLOSED. A partial unique index on (enterprise, tenant_seq) rejects a duplicate sequence at the database."
      - "Independent verification: a shared dependency-free verification core (sdk/go/audit) canonicalizes, hash-chains and ed25519-verifies a per-tenant chain and re-verifies the offline WORM/SIEM package (signatures, hash chain, monotonic single-tenant sequence, batch Merkle roots and witnesses, revoked-key detection, raw-payload and business-Outcome rejection). The existing UNSIGNED chain fails the signed verifier. The runtime and the standalone enterprise offline verifier consume this SAME core, so they cannot diverge."
      - "Receipt verification activated: the GA Task 0F ReceiptVerifier seam (left nil) is now filled and wired in the composition root with a live signing-key resolver; only a receipt whose ed25519 signature verifies against a registered, non-revoked connector key completes an Action (unsigned, forged, wrong-key and revoked-key receipts are rejected). The local structural checks remain the floor and are never weakened."
    artifacts:
      - "api/proto/agentnexus/audit/v1/audit.proto"
  - version: "1.6.0"
    date: "2026-07-14"
    breaking: false
    title: "Add durable controlled execution (GA Task 0F)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: the
      durable Action lifecycle gains its two missing runtime operations — a
      connector-to-gateway execution-result ingestion callback and a
      compensation trigger. No existing schema, field, operation or enum
      changes; the frozen Action, ActionReceipt, ActionStatus, RiskDecision,
      StepGrant and ObservationReceipt shapes are byte-stable. Identity-out-of-
      request, opaque-handle and connector-topology boundaries are preserved,
      and the authority boundary stays frozen: an Action `succeeded` records
      declared TECHNICAL execution only — AgentNexus never asserts a business
      Outcome, and no operation, response or receipt carries one.
    changes:
      - "New POST /v1/runtime/actions/{action_ref}/receipts (ingestRuntimeActionReceipt): the connector host reports one execution result. Only a receipt binding the exact action (action_ref + parameter_hash + capability) and matching the declared expected_receipt_schema completes the action to its TECHNICAL succeeded/failed status; a redelivered result carrying the same result_id is deduplicated by the inbox and applied exactly once. Request body ActionReceiptIngestRequest = RequestEnvelope + result_id + the frozen ActionReceipt; response is the frozen Action."
      - "New POST /v1/runtime/actions/{action_ref}/compensations (triggerRuntimeActionCompensation): compensation is another governed Action — it mints a NEW action for the declared compensation capability with its own grant, dispatch and receipts (never a magic rollback). Idempotent per original action_ref; an action that declared no compensation reference is rejected (422). Request body RequestEnvelope; response is the frozen Action (the new compensation)."
      - "New schemas ActionRefHandle (opaque act_ handle) and ActionReceiptIngestRequest. Both reuse the frozen opaque handles and the frozen ActionReceipt; no trusted-identity, connector-topology or business-outcome name is introduced."
      - "Semantics activated behind the frozen shapes: one logical Action per (tenant, idempotency_key); requested -> awaiting_approval (approval plan) or -> granted; approval evidence consumed one-shot to mint the one-use grant; granted -> dispatched persists Action + transactional outbox atomically before dispatch; a connector timeout after possible execution becomes result_unknown (blind retry forbidden) and resolves through reconciliation; compensation is separately authorized. Trusted callers only: an untrusted or uncertified decision can never reach a side effect."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
  - version: "1.5.0"
    date: "2026-07-14"
    breaking: true
    title: "Replace approval-route resolution with approval transmission (GA Task 0E)"
    summary: >-
      Boundary-enforcing retirement plus its replacement surface. The locked
      product boundary states that the approval authority (the calling
      first-party Agent platform or the customer's OA/BPM system) decides
      business intent, risk and the approval plan - who approves, in what
      order, under which policy - while AgentNexus transmits the caller's
      signed plan unchanged, validates returned evidence and enforces
      execution constraints. The legacy resolution operation violated that
      boundary by classifying domain risk, walking the organization
      hierarchy and choosing reviewers/queues inside AgentNexus, so it is
      REMOVED, not renamed. Breaking is the honest classification (an
      operation and two schemas disappear; precedent: the 1.0.0 cutover);
      the ELC-NEXUS-1 candidate remains UNSIGNED until Task 0G conformance,
      so the freeze window permits this mandated retirement. No SDK or proto
      change: the transmission surface binds the frozen v1.0.0 types
      (runtime.ApprovalRequest/ApprovalPlanRef/ApprovalEvidence/
      ApprovalDecision; trust/v1 mirrors) whose HTTP operations were
      documented to arrive additively in a later task.
    changes:
      - "REMOVED (breaking): POST /v1/approvals/resolve (operationId resolveApprovalRoute) with its Idempotency-Key and facts-attestation headers, plus the ApprovalRoute and ApprovalResolveRequest schemas. AgentNexus no longer resolves approval routes: no route modes, no reviewer selection, no admin queue routing, no AgentNexus-authored domain risk. There is no legacy fallback."
      - "New POST /v1/approvals/transmissions (transmitApprovalPlan): transmits ONE signed approval plan unchanged, bound to one exact operation (ApprovalTransmissionRequest = RequestEnvelope + business_context_ref, capability, parameter_hash, purpose, plan (frozen ApprovalPlanRef), expires_at). Idempotent per plan_ref; a still-pending plan is re-delivered (provider retry); rebinding a plan_ref to a different operation is a conflict. Transport failure keeps the transmission pending and can never create approval progress or a grant."
      - "New GET /v1/approvals/transmissions/{plan_ref} (getApprovalTransmission): diagnostics status view (ApprovalTransmissionStatus) with the monotonic transport lifecycle pending -> delivered -> evidence_recorded (revoked terminal), the exact operation binding, delivery attempt count and the validated decision once recorded. Deliberately no grant state and not a single approver identity, queue or risk field."
      - "New POST /v1/approvals/evidence (recordApprovalEvidence): records the authority's attested decision (ApprovalEvidenceRecordRequest wrapping the frozen ApprovalEvidence type). AgentNexus VALIDATES evidence - exact Action/parameter binding (capability + parameter_hash + plan digest), authority provenance, expiry, revocation and replay (identical resubmission idempotent; mutated approval_ref content, a second decision for one plan or cross-plan reuse rejected) - and stores it for the Task 0F Action lifecycle to consume. Recording evidence never issues a grant."
      - "New POST /v1/approvals/transmissions/{plan_ref}/revocations (revokeApprovalTransmission): terminal, idempotent, append-only revocation; recorded evidence of a revoked transmission is unusable for grant issuance."
      - "New component schemas: ApprovalTransmissionRequest, ApprovalEvidence, ApprovalEvidenceRecordRequest, ApprovalTransmissionStatus, ApprovalTransmissionRevocationRequest and the shared ApprovalDecision enum (approved/denied/narrowed, mirroring trust/v1). All reuse the frozen opaque handles (apl_/apv_/wc_) and Sha256Ref/Capability/Signature primitives; identity-out-of-request and opaque-handle boundaries are preserved."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
  - version: "1.4.0"
    date: "2026-07-14"
    breaking: false
    title: "Activate verification-purpose reads that mint signed observation receipts (GA Task 0D amendment, plan dc81e80)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: the
      /v1/runtime/read operation gains an OPTIONAL verification binding on
      the request and an OPTIONAL signed ObservationReceipt emission on the
      response, activating the v1.3.0 receipt type end to end. No existing
      schema, field, operation or enum changes; ordinary reads keep their
      exact prior request and response shapes. Identity-out-of-request,
      opaque-handle and connector-topology boundaries are preserved, and the
      authority boundary of v1.3.0 stays frozen: the receipt proves what an
      authorized source reported at a bounded time - AgentNexus never
      interprets domain success, never asserts a business Outcome and never
      touches the calling Agent platform's result graph.
    changes:
      - "New VerificationBinding block (action_ref + parameter_hash + postcondition_id + verification_need_id + data_class): binds the original executed Action and the declared PostconditionSpec/VerificationNeed pair a read verifies, carrying the need's declared business-semantic data-class expectation (VerificationNeed vocabulary; no parallel names). The block is all-or-nothing - every member is required and validated by the frozen v1.3.0 validators (opaque act_ handle, sha256 parameter hash)."
      - "EvidenceReadRequest gains the OPTIONAL verification_binding member, coupled bidirectionally to the frozen verification purpose \"postcondition_verification\" (SDK PurposeVerification): a binding without that purpose and that purpose without a binding are BOTH rejected (detached verification reads fail closed)."
      - "EvidenceReadResponse gains the OPTIONAL observation_receipt member: the signed runtime.ObservationReceipt (contract v1.3.0), emitted ONLY on an allowed verification-purpose read and never on ordinary reads or denials."
      - "Authority-derivation rule frozen: observation authority tier, sealed source version, observed-at and freshness bounds are DERIVED SERVER-SIDE from the private registry binding and the service clock. They are never accepted from request JSON - no public request field can carry them and strict decoding rejects the unknown keys; a caller-declared expectation that conflicts with server-derived truth (data-class mismatch) fails closed as a deny."
      - "Cache honesty extends to receipts: reads serve locate-staged content, so observed_at states the STAGING instant (the response as_of), never the mint instant, and fresh_until is observed_at plus the registry-declared freshness bound - a receipt never claims fresher than the staged reality. A verification-purpose read requires the explicit cached-read grant, the CURRENT source version and an unexpired freshness bound; otherwise it fails closed without minting."
      - "Proto parity: agentnexus.evidence.v1 gains the VerificationBinding message and the append-only EvidenceReadRequest field 9 (verification_binding). The read-response envelope remains an OpenAPI/SDK surface (as since contract v1.2.0), so no response message is added."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
      - "api/proto/agentnexus/evidence/v1/evidence.proto"
    sdk:
      module: "github.com/astraclawteam/agentnexus/sdk/go/runtime"
      note: "adds PurposeVerification and VerificationBinding (evidence.go) plus the optional EvidenceReadRequest.verification_binding member with canonical detached-read rejection"
  - version: "1.3.0"
    date: "2026-07-14"
    breaking: false
    title: "Separate action and outcome authority: postconditions, verification needs and signed observation receipts (GA Task 0A amendment, plan dc81e80)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: three
      new public types (PostconditionSpec, VerificationNeed,
      ObservationReceipt) and two OPTIONAL ActionRequest arrays bind
      post-action verification to declared postconditions. No existing
      schema, field, operation or enum changes and no new operations (the
      verification-purpose read wiring that produces ObservationReceipts
      arrives with the Task 0D amendment; an unreferenced component schema is
      legal). Identity-out-of-request, opaque-handle and connector-topology
      boundaries are preserved.
    changes:
      - "New PostconditionSpec (postcondition_id + kind + reference + optional expected): a declared business-state condition expected to hold AFTER the action executed. Declared by the calling Agent, recorded and transmitted — never evaluated for business success — by AgentNexus."
      - "New VerificationNeed (need_id + postcondition_id + data_class): a declared post-action verification data need binding exactly one declared postcondition to a business-semantic data class; never a connector table, API path or instance selector. Only declared verification needs may ever be verified."
      - "ActionRequest gains OPTIONAL postconditions and verification_needs arrays, completing its binding to '... idempotency key, preconditions, postconditions, verification needs, expiry, expected execution-receipt schema and optional compensation reference'. Canonical validation: every entry validates, postcondition_id/need_id values are unique, and every verification need must reference a declared postcondition (dangling bindings are rejected)."
      - "New ObservationReceipt with the new obs_ opaque handle prefix (ObservationRef; SDK HandleObservation): binds the original Action and parameter hash (action_ref + parameter_hash), the declared PostconditionSpec/VerificationNeed pair (postcondition_id + verification_need_id), source and sealed source_version, the reporting authority, the observed_at/fresh_until freshness bounds (fresh_until must be after observed_at), the sha256 hash of the normalized observation, the evidence handle (evd_*) carrying the observation content and the audit reference (audit_ref_id), under a REQUIRED AgentNexus signature — unlike ActionReceipt's Task-0G-activated optional signing slot, an unsigned observation is not an ObservationReceipt. Every field is required and the observation payload stays handle-addressed (opaque-handle discipline, like receipt_ref): it is never embedded in the receipt."
      - "Authority boundary frozen: ActionReceipt attests technical execution only; ObservationReceipt proves what an authorized source reported at a bounded time; NEITHER type contains a business Outcome assertion. AgentNexus never decides whether a business Outcome or WorkCase goal was achieved, never authors Outcomes and never owns or queries the calling Agent platform's result graph; only the calling Agent's deterministic domain runtime turns observed facts into an Outcome."
      - "New public-surface prohibition enforced by the parity gate: no public schema/field/property name may be or contain outcome or goal_achieved, and no graph-provider name (graph, graph_*, *_graph) may appear in the public OpenAPI/proto surface; the SDK type walker enforces the same boundary on Go JSON tags. The ban targets names, never prose descriptions."
      - "Proto parity: agentnexus.actions.v1 gains PostconditionSpec, VerificationNeed and ObservationReceipt messages plus append-only ActionRequest fields 15 (postconditions) and 16 (verification_needs)."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
      - "api/proto/agentnexus/actions/v1/actions.proto"
    sdk:
      module: "github.com/astraclawteam/agentnexus/sdk/go/runtime"
      note: "adds PostconditionSpec, VerificationNeed, ObservationReceipt (receipt.go) and ActionRequest postconditions/verification_needs with canonical validation"
  - version: "1.2.0"
    date: "2026-07-14"
    breaking: false
    title: "Activate semantic evidence reads with cache-honest response metadata (GA Task 0D)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: the
      already-frozen /v1/runtime/locate and /v1/runtime/read operations gain
      their credential security bindings and EvidenceReadResponse gains
      server-authored cache-honesty and pagination metadata. No request schema
      changes; identity-out-of-request, opaque-handle and connector-topology
      boundaries are preserved (semantic resolution stays private server-side).
    changes:
      - "POST /v1/runtime/locate and POST /v1/runtime/read now declare their credential bindings (browserSession / caseTicket); the trusted context is resolved once at ingress and request JSON still never carries identity."
      - "EvidenceReadResponse gains OPTIONAL server-authored response fields: source_version (int64), as_of (date-time) and served_from_cache (boolean) — always emitted on an allowed read so a cached response states its provenance explicitly and never masquerades as real-time data."
      - "EvidenceReadResponse gains an OPTIONAL continuation_ref (opaque evd_* handle): when constraints.max_results bounds a read, the next page is addressed by a fresh opaque handle carrying the same server-side binding; results are never silently truncated."
      - "Semantics activated behind the frozen shapes: data classes resolve privately to internal source bindings; issued handles bind tenant, actor, Agent release, org version, source version, purpose, content hash, authorization lineage, TTL and an optional raw-content retention TTL server-side; expired, revoked, source-deleted and source-version-stale handles fail closed as deny; serving staged (cached) content requires an explicit cached-read grant; connector-backed data classes require the credential-derived connector capability (AstraClaw/Xiaozhi origins are denied)."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
  - version: "1.1.0"
    date: "2026-07-13"
    breaking: false
    title: "Add Agent-client registration, certification and revocation (GA Task 0C)"
    summary: >-
      Additive, backward-compatible evolution of the frozen contract: new
      Agent-client trust-registry operations and schemas. No existing schema,
      field, operation or enum changes; identity-out-of-request and opaque-handle
      discipline are preserved (the tenant derives from verified first-party
      service credentials and never travels in a request body).
    changes:
      - "New operations on gateway-runtime.yaml: POST /v1/agent-clients (registerAgentClient), POST /v1/agent-clients/{agent_client_ref}/certifications (certifyAgentClient) and POST /v1/agent-clients/{agent_client_ref}/certifications/{certification_ref}/revocations (revokeAgentCertification), all under trustedServiceSecret."
      - "New opaque handles agc_ (AgentClientRef) and cert_ (CertificationRef); a certification binds publisher, product, semantic version range (VersionRange), signing key (SigningKey), signed release-manifest digest (Sha256Ref), trust class and capability ceiling."
      - "TrustClass schema documents the frozen classes first_party_trusted / certified_third_party / untrusted; untrusted is the absence of a certification and is never certifiable. A certification request's trust_class is the certifying authority's decision about the client, not a self-asserted caller identity, so it is not caller-supplied trusted identity."
      - "first_party_trusted requires enterprise registration and a signed build manifest (manifest_signature over release_manifest_digest); the capability ceiling is the maximum a customer policy may narrow but never raise; AstraClaw/Xiaozhi origins never receive enterprise connector capability; a certified third party reaches a side effect only with a certified decision provider."
      - "Certification revisions are immutable and status changes (active/revoked/superseded/expired) are append-only; revocation appends and never mutates prior rows."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
  - version: "1.0.0"
    date: "2026-07-13"
    breaking: true
    title: "Freeze the vendor-neutral Agent runtime contract (ELC-NEXUS-1 candidate)"
    summary: >-
      One-time versioned cutover of every public Agent-facing schema. No
      dual-shape support and no legacy fields remain. The service runtime
      adopts the new envelope in the follow-up runtime cutover task; this
      entry freezes the contract surface.
    changes:
      - "Trusted identity removed from all public request/response schemas: enterprise_id, actor_user_id and enterprise_user_id no longer exist anywhere; tenant, actor, organization version, trust class, risk authority and approval authority derive from verified credentials only."
      - "No request body carries trusted organization facts: org_version/org_unit_id removed from AuthorizationDecisionRequest, StepGrantRequest and ApprovalResolveRequest; the server-authored sealed snapshot version remains only in responses (BrowserSession, PermissionDecision)."
      - "Connector topology removed from the public surface: connector_instance_id and resource selectors (ResourceRef/LocatedResource, resource_name) are replaced by business-semantic data classes and opaque handles (wc_/evd_/grant_/act_/rcp_/apl_/apv_ prefixes); connector topology stays in connector-internal messages (agentnexus/connectors/v1)."
      - "Actions are typed: the untyped action+input pair is retired; ActionRequest binds business_context_ref, namespaced capability, capability-typed parameters, sha256 parameter_hash, purpose, constraints, signed RiskDecision, transmitted ApprovalPlanRef, idempotency_key, preconditions, expiry, expected_receipt_schema and optional compensation_ref."
      - "RiskDecision is signed by the calling risk authority and bound to the exact operation (capability + parameter_hash + business_context_ref); unsigned decisions are rejected. AgentNexus transmits but never authors risk decisions or approval plans."
      - "Step Grants bind one exact operation: capability + parameter_hash + one-use semantics replace resource_type/resource_id/action/scope selectors."
      - "Action lifecycle states frozen: requested, awaiting_approval, granted, dispatched, executing, succeeded, failed, result_unknown, reconciling, compensating, human_takeover."
      - "audit/v1 AuditEvent rebound to the new envelope: tenant_ref + tenant_seq, principal_ref, agent_client_ref/agent_release_ref, org_snapshot_ref, capability, parameter_hash, risk_decision_ref, approval_evidence_ref, grant_ref, action transition (status_from/status_to), receipt_ref, prev_hash/event_hash."
      - "AgentAtlas-specific generic names removed (AgentAtlasPermission -> PrincipalPermission, decideAgentAtlasPermission -> decideAuthorization, agentAtlasServiceSecret -> trustedServiceSecret); AgentAtlas is a trusted first-party client of neutral types."
      - "New public protobuf packages agentnexus.evidence.v1, agentnexus.actions.v1 and agentnexus.trust.v1; new Go SDK module github.com/astraclawteam/agentnexus/sdk/go/runtime carries the canonical types and validation."
      - "Decision — receipts are handle-addressed: Action responses carry an opaque receipt_ref (rcp_* handle) in all three artifacts (OpenAPI, Go SDK, actions/v1) and the full ActionReceipt is fetched via GET /v1/runtime/receipts/{receipt_ref}. Embedding was rejected to keep responses opaque-handle disciplined and receipt retrieval idempotent and separately authorizable."
      - "ActionReceipt requires capability and parameter_hash: a receipt binds the exact operation it accounts for."
      - "Decision — contract precedence: the Go SDK (sdk/go/runtime) is the normative validation surface; OpenAPI annotations are descriptive. OpenAPI 3.0 cannot express additionalProperties: false across allOf composition, so unknown envelope fields are rejected server-side per the SDK rules. SDK length limits count bytes (Go len); OpenAPI minLength/maxLength annotations count Unicode code points."
    artifacts:
      - "api/openapi/gateway-runtime.yaml"
      - "api/openapi/gateway-agent.yaml"
      - "api/proto/agentnexus/evidence/v1/evidence.proto"
      - "api/proto/agentnexus/actions/v1/actions.proto"
      - "api/proto/agentnexus/trust/v1/trust.proto"
      - "api/proto/agentnexus/audit/v1/audit.proto"
    sdk:
      module: "github.com/astraclawteam/agentnexus/sdk/go/runtime"
      note: "canonical Go types + canonical validation for the frozen contract"
