{{- if and .Values.dependencies.objectStorage.enabled (not .Values.dependencies.objectStorage.external) }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-object-storage
  labels:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: object-storage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agentnexus
      app.kubernetes.io/component: object-storage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentnexus
        app.kubernetes.io/component: object-storage
    spec:
      containers:
        - name: object-storage
          image: "{{ .Values.dependencies.objectStorage.image }}"
          args: ["server", "/data", "--console-address", ":9001"]
          env:
            - name: MINIO_ROOT_USER
              value: "{{ .Values.dependencies.objectStorage.rootUser }}"
            - name: MINIO_ROOT_PASSWORD
              value: "{{ .Values.dependencies.objectStorage.rootPassword }}"
          ports:
            - containerPort: 9000
            - containerPort: 9001
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-object-storage
  labels:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: object-storage
spec:
  selector:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: object-storage
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
{{- end }}
