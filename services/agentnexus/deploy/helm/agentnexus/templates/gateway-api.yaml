{{- if .Values.services.gatewayApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-gateway-api
  labels:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: gateway-api
spec:
  replicas: {{ .Values.services.gatewayApi.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: agentnexus
      app.kubernetes.io/component: gateway-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agentnexus
        app.kubernetes.io/component: gateway-api
    spec:
      containers:
        - name: gateway-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["{{ .Values.services.gatewayApi.command }}"]
          # This chart does NOT set AGENTNEXUS_BROWSER_AUTH_ENABLED, so the
          # gateway serves only /healthz, /readyz and /api/console/overview:
          # the runtime, evidence, approval, action, audit and org-event
          # surfaces are not registered. Enabling it needs an enterprise IdP
          # reachable over HTTPS, mounted signing-key and client-secret files,
          # and migrations already applied, and it fails closed at startup
          # without them -- all of which belong to the deployment, not to this
          # skeleton. The compose profiles show the full shape.
          env:
            - name: AGENTNEXUS_ENV
              value: "{{ .Values.runtime.env }}"
            - name: AGENTNEXUS_PROFILE
              value: "{{ .Values.runtime.profile }}"
            - name: AGENTNEXUS_VERSION
              value: "{{ .Values.runtime.version }}"
            - name: AGENTNEXUS_POSTGRES_DSN
              value: "{{ .Values.dependencies.postgres.dsn }}"
            - name: AGENTNEXUS_NATS_URL
              value: "{{ .Values.dependencies.nats.url }}"
            - name: AGENTNEXUS_OBJECT_STORAGE_ENDPOINT
              value: "{{ .Values.dependencies.objectStorage.endpoint }}"
            - name: AGENTNEXUS_SECRET_PROVIDER
              value: "{{ .Values.dependencies.secretProvider.mode }}"
          ports:
            - containerPort: {{ .Values.services.gatewayApi.port }}
          # Without probes the Service sends traffic to a Pod that may still be
          # starting or may have failed startup entirely, and a crash-looping
          # gateway is indistinguishable from a working one.
          readinessProbe:
            httpGet:
              path: /readyz
              port: {{ .Values.services.gatewayApi.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.services.gatewayApi.port }}
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-gateway-api
  labels:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: gateway-api
spec:
  selector:
    app.kubernetes.io/name: agentnexus
    app.kubernetes.io/component: gateway-api
  ports:
    - name: http
      port: {{ .Values.services.gatewayApi.port }}
      targetPort: {{ .Values.services.gatewayApi.port }}
{{- end }}
