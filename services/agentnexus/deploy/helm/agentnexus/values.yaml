image:
  repository: ghcr.io/astraclawteam/agentnexus
  tag: 0.1.0-dev
  pullPolicy: IfNotPresent

runtime:
  env: dev
  profile: private-dev
  version: 0.1.0-dev

services:
  gatewayApi:
    enabled: true
    replicas: 1
    port: 8080
    command: /app/gateway-api
  gatewayAgent:
    enabled: true
    replicas: 1
    command: /app/gateway-agent
    # name=url pairs the assistant probes to answer health questions. Every
    # answer it gives about readiness comes from this list, so a service left
    # out of it is a service the assistant will never mention.
    healthProbeTargets: >-
      gateway-api=http://agentnexus-gateway-api:8080/readyz,connector-worker=http://agentnexus-connector-worker:8080/readyz
  connectorWorker:
    enabled: true
    replicas: 1
    command: /app/connector-worker

dependencies:
  postgres:
    enabled: true
    external: false
    image: postgres:16-alpine
    database: agentnexus
    username: agentnexus
    password: agentnexus
    dsn: postgres://agentnexus:agentnexus@agentnexus-postgres:5432/agentnexus?sslmode=disable
  nats:
    enabled: true
    external: false
    image: nats:2.10-alpine
    url: nats://agentnexus-nats:4222
  objectStorage:
    enabled: true
    external: false
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    endpoint: http://agentnexus-object-storage:9000
    rootUser: agentnexus
    rootPassword: agentnexus-dev-secret
  secretProvider:
    external: false
    mode: local-dev
  # The llmrouter gateway is the single outbound model path for the gateway
  # agent. There is deliberately no default baseURL or model: an unset value
  # leaves the assistant unready and saying so, which is the honest state.
  llmRouter:
    baseURL: ""
    model: ""
    # The API key is NEVER a chart value. Provision the Secret out of band and
    # name it here; the Deployment references it with secretKeyRef.
    apiKeySecret:
      name: agentnexus-llmrouter
      key: api-key
