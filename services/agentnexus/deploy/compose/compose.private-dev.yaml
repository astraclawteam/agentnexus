name: agentnexus-private-dev

x-agentnexus-service: &agentnexus-service
  image: golang:1.25-alpine
  working_dir: /workspace/services/agentnexus
  volumes:
    - ../../../..:/workspace
  environment: &agentnexus-env
    AGENTNEXUS_ENV: private-dev
    AGENTNEXUS_VERSION: 0.1.0-dev
    AGENTNEXUS_PROFILE: private-dev
    AGENTNEXUS_PRIVATE_BOUNDARY: local
    AGENTNEXUS_POSTGRES_EXTERNAL: "${AGENTNEXUS_POSTGRES_EXTERNAL:-false}"
    AGENTNEXUS_POSTGRES_DSN: "${AGENTNEXUS_POSTGRES_DSN:-postgres://agentnexus:agentnexus@postgres:5432/agentnexus?sslmode=disable}"
    AGENTNEXUS_NATS_EXTERNAL: "${AGENTNEXUS_NATS_EXTERNAL:-false}"
    AGENTNEXUS_NATS_URL: "${AGENTNEXUS_NATS_URL:-nats://nats:4222}"
    AGENTNEXUS_OBJECT_STORAGE_EXTERNAL: "${AGENTNEXUS_OBJECT_STORAGE_EXTERNAL:-false}"
    AGENTNEXUS_OBJECT_STORAGE_ENDPOINT: "${AGENTNEXUS_OBJECT_STORAGE_ENDPOINT:-http://object-storage:9000}"
    # gateway-api serves ONLY /healthz, /readyz and /api/console/overview until
    # browser auth is enabled: cmd/gateway-api/main.go returns the minimal
    # router when this is unset, so the runtime, evidence, approval, action,
    # audit and org-event surfaces are not registered and every cross-product
    # call 404s. Enabling it is not a single flag -- OIDC signing key material
    # and console client secrets must be provisioned first (tasks E1/E2), and
    # the process fails closed at startup if any of them are missing:
    #   AGENTNEXUS_BROWSER_AUTH_ENABLED: "true"
    #   AGENTNEXUS_OIDC_SIGNING_KEY_PATH, AGENTNEXUS_OIDC_SIGNING_KEY_ID
    #   AGENTNEXUS_OIDC_CONSOLE_CLIENTS_JSON
    #   AGENTNEXUS_OIDC_CONSOLE_CLIENT_SECRET_FILES_JSON
    #   AGENTNEXUS_OIDC_UPSTREAM_CLIENT_SECRET_FILE
    #   AGENTNEXUS_OIDC_ENTERPRISE_ID, _ENTERPRISE_ISSUER_URL, _PUBLIC_ISSUER_URL,
    #   _CLIENT_ID, _CALLBACK_URL
    AGENTNEXUS_BROWSER_AUTH_ENABLED: "${AGENTNEXUS_BROWSER_AUTH_ENABLED:-false}"
    # Registers the approval transmission surface. No outbound OA/BPM delivery
    # exists yet (B7), so pending-only correlates plans durably and reports them
    # honestly undelivered rather than 404ing AgentAtlas.
    AGENTNEXUS_APPROVAL_CHANNEL: "${AGENTNEXUS_APPROVAL_CHANNEL:-pending-only}"
    AGENTNEXUS_SECRET_PROVIDER: "${AGENTNEXUS_SECRET_PROVIDER:-local-dev}"
    AGENTNEXUS_SECRET_PROVIDER_EXTERNAL: "${AGENTNEXUS_SECRET_PROVIDER_EXTERNAL:-false}"
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_healthy
    object-storage:
      condition: service_started

services:
  gateway-api:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-api"]
    ports:
      - "${AGENTNEXUS_GATEWAY_API_PORT:-8080}:8080"

  gateway-agent:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-agent"]
    ports:
      - "${AGENTNEXUS_GATEWAY_AGENT_PORT:-8081}:8080"
    # Liveness only, matching connector-worker. The assistant reports
    # not-ready until its llmrouter model and deterministic diagnostics
    # service are wired; that gap is logged and visible at /readyz, and
    # must not paint the whole stack red.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  connector-worker:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/connector-worker"]
    ports:
      - "${AGENTNEXUS_CONNECTOR_WORKER_PORT:-8082}:8080"
    # Liveness only. /readyz is deliberately NOT the container health
    # probe: the worker reports not-ready until its BindingResolver and
    # ObservationProducer seams land, and marking the whole stack
    # unhealthy for a known, logged gap would hide real failures.
    # Readiness stays observable at /readyz and in the startup log.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentnexus
      POSTGRES_USER: agentnexus
      POSTGRES_PASSWORD: agentnexus
    ports:
      - "${AGENTNEXUS_POSTGRES_PORT:-15432}:5432"
    volumes:
      - agentnexus-private-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentnexus -d agentnexus"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${AGENTNEXUS_NATS_PORT:-14222}:4222"
      - "${AGENTNEXUS_NATS_MONITOR_PORT:-18222}:8222"

  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: agentnexus
      MINIO_ROOT_PASSWORD: agentnexus-dev-secret
    ports:
      - "${AGENTNEXUS_OBJECT_STORAGE_PORT:-19000}:9000"
      - "${AGENTNEXUS_OBJECT_STORAGE_CONSOLE_PORT:-19001}:9001"
    volumes:
      - agentnexus-private-object-storage:/data

volumes:
  agentnexus-private-postgres:
  agentnexus-private-object-storage:
