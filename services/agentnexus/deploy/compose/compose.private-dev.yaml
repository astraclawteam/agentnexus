name: agentnexus-private-dev

# The browser-authentication material, dev IdP and schema migrator that let
# gateway-api serve its full surface instead of the minimal health/console
# router. Shared with the SaaS-dev profile; see the file for what each part
# exists to satisfy.
include:
  - path: browser-auth-dev.yaml

x-agentnexus-service: &agentnexus-service
  image: golang:1.25-alpine
  working_dir: /workspace/services/agentnexus
  volumes:
    - ../../../..:/workspace
    # The three Go services compile the same module tree. Sharing the module
    # and build caches turns three cold `go run` builds into roughly one.
    - agentnexus-private-dev-gomodcache:/go/pkg/mod
    - agentnexus-private-dev-gobuildcache:/root/.cache/go-build
  environment: &agentnexus-env
    # Only variables some Go code actually reads. The profile previously also
    # exported AGENTNEXUS_PROFILE, AGENTNEXUS_PRIVATE_BOUNDARY, the three
    # *_EXTERNAL toggles, AGENTNEXUS_OBJECT_STORAGE_ENDPOINT and both
    # AGENTNEXUS_SECRET_PROVIDER* variables; none of them had a reader
    # anywhere in the module, so setting them -- including pointing an
    # *_EXTERNAL toggle at a real external service -- changed nothing while
    # reading as configuration.
    AGENTNEXUS_ENV: private-dev
    AGENTNEXUS_VERSION: 0.1.0-dev
    AGENTNEXUS_POSTGRES_DSN: "${AGENTNEXUS_POSTGRES_DSN:-postgres://agentnexus:agentnexus@postgres:5432/agentnexus?sslmode=disable}"
    AGENTNEXUS_NATS_URL: "${AGENTNEXUS_NATS_URL:-nats://nats:4222}"
    # Registers the approval transmission surface. No outbound OA/BPM delivery
    # exists yet (B7), so pending-only correlates plans durably and reports them
    # honestly undelivered rather than 404ing AgentAtlas.
    AGENTNEXUS_APPROVAL_CHANNEL: "${AGENTNEXUS_APPROVAL_CHANNEL:-pending-only}"
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_healthy
    object-storage:
      condition: service_started

services:
  gateway-api:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-api"]
    ports:
      - "${AGENTNEXUS_GATEWAY_API_PORT:-8080}:8080"
    # The browser-auth environment, credential volume, ordering and health
    # probe all arrive from browser-auth-dev.yaml.

  gateway-agent:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-agent"]
    ports:
      - "${AGENTNEXUS_GATEWAY_AGENT_PORT:-8081}:8080"
    environment:
      <<: *agentnexus-env
      # The assistant's only outbound model path. The dev stack does not ship
      # a router, so these are unset by default and the assistant reports
      # itself not ready with the missing variables named. Set all three to
      # bring it up locally.
      AGENTNEXUS_LLMROUTER_BASE_URL: "${AGENTNEXUS_LLMROUTER_BASE_URL:-}"
      AGENTNEXUS_LLMROUTER_MODEL: "${AGENTNEXUS_LLMROUTER_MODEL:-}"
      AGENTNEXUS_LLMROUTER_API_KEY: "${AGENTNEXUS_LLMROUTER_API_KEY:-}"
      # Services the assistant probes to answer health questions. Every
      # readiness fact it states comes from this list.
      AGENTNEXUS_HEALTH_PROBE_TARGETS: "${AGENTNEXUS_HEALTH_PROBE_TARGETS:-gateway-api=http://gateway-api:8080/readyz,connector-worker=http://connector-worker:8080/readyz}"
    # Liveness only, matching connector-worker. /readyz is deliberately NOT
    # the container probe: without a configured llmrouter there is no model,
    # so the assistant stays unready by design in the default dev stack. That
    # gap is logged and visible at /readyz and must not paint the stack red.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  connector-worker:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/connector-worker"]
    ports:
      - "${AGENTNEXUS_CONNECTOR_WORKER_PORT:-8082}:8080"
    # Liveness only. /readyz is deliberately NOT the container health
    # probe: the worker reports not-ready until its BindingResolver and
    # ObservationProducer seams land, and marking the whole stack
    # unhealthy for a known, logged gap would hide real failures.
    # Readiness stays observable at /readyz and in the startup log.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 40s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentnexus
      POSTGRES_USER: agentnexus
      POSTGRES_PASSWORD: agentnexus
    ports:
      - "${AGENTNEXUS_POSTGRES_PORT:-15432}:5432"
    volumes:
      - agentnexus-private-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentnexus -d agentnexus"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${AGENTNEXUS_NATS_PORT:-14222}:4222"
      - "${AGENTNEXUS_NATS_MONITOR_PORT:-18222}:8222"

  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: agentnexus
      MINIO_ROOT_PASSWORD: agentnexus-dev-secret
    ports:
      - "${AGENTNEXUS_OBJECT_STORAGE_PORT:-19000}:9000"
      - "${AGENTNEXUS_OBJECT_STORAGE_CONSOLE_PORT:-19001}:9001"
    volumes:
      - agentnexus-private-object-storage:/data

volumes:
  agentnexus-private-postgres:
  agentnexus-private-object-storage:
  # The credential volume itself is declared by browser-auth-dev.yaml.
  agentnexus-private-dev-gomodcache:
  agentnexus-private-dev-gobuildcache:
