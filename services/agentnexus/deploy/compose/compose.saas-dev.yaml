name: agentnexus-saas-dev

# The browser-authentication material, dev IdP and schema migrator that let
# gateway-api serve its full surface instead of the minimal health/console
# router. Shared with the private-dev profile; see the file for what each part
# exists to satisfy.
include:
  - path: browser-auth-dev.yaml

# The services run as built images, not as `go run` against a mounted
# repository. Compiling at container start made the build part of every
# service's startup latency and of its failure surface: a start_period had to
# cover a compile it could not predict, and one truncated module download left
# a container exited with no way to tell that apart from a fatal
# misconfiguration. Building once, ahead of `up`, removes both.
#
# The services share every layer except the final `go build`, so each image
# after the first costs only that step, and they share one module and build
# cache between them.
x-agentnexus-build: &agentnexus-build
  # The repository root: the service module `replace`s ../../sdk/go/*, so both
  # module trees have to be inside the context.
  context: ../../../..
  dockerfile: services/agentnexus/deploy/docker/Dockerfile

x-agentnexus-service: &agentnexus-service
  # Secondary to the change above, and deliberately bounded. With the build out
  # of container start there is nothing transient left for a restart to paper
  # over; what remains is a dependency that dropped after startup, which a few
  # retries recover, and a fail-closed configuration error, which no number of
  # retries will. Three attempts covers the first without turning the second
  # into an endless loop that hides the exit status behind `Restarting`.
  restart: on-failure:3
  environment: &agentnexus-env
    # Only variables some Go code actually reads. The profile previously also
    # exported AGENTNEXUS_PROFILE, the three *_EXTERNAL toggles,
    # AGENTNEXUS_OBJECT_STORAGE_ENDPOINT and both AGENTNEXUS_SECRET_PROVIDER*
    # variables; none of them had a reader anywhere in the module, so setting
    # them changed nothing while reading as configuration. The object-storage
    # service they described is gone too; see the note above the volumes block.
    AGENTNEXUS_ENV: saas-dev
    AGENTNEXUS_VERSION: 0.1.0-dev
    AGENTNEXUS_POSTGRES_DSN: postgres://agentnexus:agentnexus@postgres:5432/agentnexus?sslmode=disable
    AGENTNEXUS_NATS_URL: nats://nats:4222
    # Registers the approval transmission surface. No outbound OA/BPM delivery
    # exists yet (B7), so pending-only correlates plans durably and reports them
    # honestly undelivered rather than 404ing AgentAtlas.
    AGENTNEXUS_APPROVAL_CHANNEL: "${AGENTNEXUS_APPROVAL_CHANNEL:-pending-only}"
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_healthy

services:
  gateway-api:
    <<: *agentnexus-service
    image: agentnexus/gateway-api:dev
    build:
      <<: *agentnexus-build
      args:
        SERVICE: gateway-api
    ports:
      - "${AGENTNEXUS_GATEWAY_API_PORT:-8080}:8080"
    # The browser-auth environment, credential volume, ordering, user and health
    # probe all arrive from browser-auth-dev.yaml.

  gateway-agent:
    <<: *agentnexus-service
    image: agentnexus/gateway-agent:dev
    build:
      <<: *agentnexus-build
      args:
        SERVICE: gateway-agent
    ports:
      - "${AGENTNEXUS_GATEWAY_AGENT_PORT:-8081}:8080"
    environment:
      <<: *agentnexus-env
      # The assistant's only outbound model path. The dev stack does not ship
      # a router, so these are unset by default and the assistant reports
      # itself not ready with the missing variables named. Set all three to
      # bring it up locally.
      AGENTNEXUS_LLMROUTER_BASE_URL: "${AGENTNEXUS_LLMROUTER_BASE_URL:-}"
      AGENTNEXUS_LLMROUTER_MODEL: "${AGENTNEXUS_LLMROUTER_MODEL:-}"
      AGENTNEXUS_LLMROUTER_API_KEY: "${AGENTNEXUS_LLMROUTER_API_KEY:-}"
      # Services the assistant probes to answer health questions. Every
      # readiness fact it states comes from this list.
      AGENTNEXUS_HEALTH_PROBE_TARGETS: "${AGENTNEXUS_HEALTH_PROBE_TARGETS:-gateway-api=http://gateway-api:8080/readyz,connector-worker=http://connector-worker:8080/readyz}"
    # Liveness only, matching connector-worker. /readyz is deliberately NOT
    # the container probe: without a configured llmrouter there is no model,
    # so the assistant stays unready by design in the default dev stack. That
    # gap is logged and visible at /readyz and must not paint the stack red.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      # Set from process start, and only process start: the binary is built
      # into the image. It dials NATS and Postgres, both already healthy by
      # depends_on, then serves. Measured container start to first passing
      # probe is 6s, and 5s of that is the probe interval itself.
      start_period: 15s

  connector-worker:
    <<: *agentnexus-service
    image: agentnexus/connector-worker:dev
    build:
      <<: *agentnexus-build
      args:
        SERVICE: connector-worker
    ports:
      - "${AGENTNEXUS_CONNECTOR_WORKER_PORT:-8082}:8080"
    # Liveness only. /readyz is deliberately NOT the container health
    # probe: the worker reports not-ready until its BindingResolver and
    # ObservationProducer seams land, and marking the whole stack
    # unhealthy for a known, logged gap would hide real failures.
    # Readiness stays observable at /readyz and in the startup log.
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8080/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      # Set from process start, and only process start: the binary is built
      # into the image. It dials NATS and Postgres, both already healthy by
      # depends_on, then serves. Measured container start to first passing
      # probe is 6s, and 5s of that is the probe interval itself.
      start_period: 15s

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentnexus
      POSTGRES_USER: agentnexus
      POSTGRES_PASSWORD: agentnexus
    ports:
      - "${AGENTNEXUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentnexus-saas-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentnexus -d agentnexus"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:8222/healthz || exit 1"]
      interval: 3s
      timeout: 3s
      retries: 20
    ports:
      - "${AGENTNEXUS_NATS_PORT:-4222}:4222"
      - "${AGENTNEXUS_NATS_MONITOR_PORT:-8222}:8222"

# There is no object-storage service. A MinIO instance ran here, and every
# AgentNexus service was ordered behind it, on the strength of an
# AGENTNEXUS_OBJECT_STORAGE_ENDPOINT variable that no Go file in the module
# reads -- `grep -rn OBJECT_STORAGE --include=*.go` finds nothing, and the
# module depends on no S3 or MinIO client. The only content AgentNexus stages
# is evidence, under AGENTNEXUS_EVIDENCE_OBJECT_ROOT, which is a node-local
# filesystem path. So the depends_on edges delayed three services on a
# dependency none of them talk to, and `service_started` would not have caught
# a MinIO that came up and then failed to serve anyway.

volumes:
  agentnexus-saas-postgres:
  # The credential volume itself is declared by browser-auth-dev.yaml.
