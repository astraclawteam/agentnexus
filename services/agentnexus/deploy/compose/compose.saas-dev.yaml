name: agentnexus-saas-dev

x-agentnexus-service: &agentnexus-service
  image: golang:1.25-alpine
  working_dir: /workspace/services/agentnexus
  volumes:
    - ../../../..:/workspace
  environment: &agentnexus-env
    AGENTNEXUS_ENV: saas-dev
    AGENTNEXUS_VERSION: 0.1.0-dev
    AGENTNEXUS_PROFILE: saas-dev
    AGENTNEXUS_POSTGRES_EXTERNAL: "false"
    AGENTNEXUS_POSTGRES_DSN: postgres://agentnexus:agentnexus@postgres:5432/agentnexus?sslmode=disable
    AGENTNEXUS_NATS_EXTERNAL: "false"
    AGENTNEXUS_NATS_URL: nats://nats:4222
    AGENTNEXUS_OBJECT_STORAGE_EXTERNAL: "false"
    AGENTNEXUS_OBJECT_STORAGE_ENDPOINT: http://object-storage:9000
    AGENTNEXUS_SECRET_PROVIDER: local-dev
    AGENTNEXUS_SECRET_PROVIDER_EXTERNAL: "false"
  depends_on:
    postgres:
      condition: service_healthy
    nats:
      condition: service_started
    object-storage:
      condition: service_started

services:
  gateway-api:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-api"]
    ports:
      - "${AGENTNEXUS_GATEWAY_API_PORT:-8080}:8080"

  gateway-agent:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/gateway-agent"]
    environment:
      <<: *agentnexus-env
      AGENTNEXUS_HTTP_ADDR: ":8081"
    ports:
      - "${AGENTNEXUS_GATEWAY_AGENT_PORT:-8081}:8081"

  connector-worker:
    <<: *agentnexus-service
    command: ["go", "run", "./cmd/connector-worker"]

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: agentnexus
      POSTGRES_USER: agentnexus
      POSTGRES_PASSWORD: agentnexus
    ports:
      - "${AGENTNEXUS_POSTGRES_PORT:-5432}:5432"
    volumes:
      - agentnexus-saas-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentnexus -d agentnexus"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "${AGENTNEXUS_NATS_PORT:-4222}:4222"
      - "${AGENTNEXUS_NATS_MONITOR_PORT:-8222}:8222"

  object-storage:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: agentnexus
      MINIO_ROOT_PASSWORD: agentnexus-dev-secret
    ports:
      - "${AGENTNEXUS_OBJECT_STORAGE_PORT:-9000}:9000"
      - "${AGENTNEXUS_OBJECT_STORAGE_CONSOLE_PORT:-9001}:9001"
    volumes:
      - agentnexus-saas-object-storage:/data

volumes:
  agentnexus-saas-postgres:
  agentnexus-saas-object-storage:
